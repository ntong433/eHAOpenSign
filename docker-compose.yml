services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    restart: unless-stopped
    depends_on:
      client:
        condition: service_healthy
      server:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1/health >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  client:
    build:
      context: .
      dockerfile: apps/OpenSign/Dockerfile
      args:
        REACT_APP_APPID: ${APP_ID:-opensign}
        REACT_APP_SERVERURL: ${REACT_APP_SERVERURL:-/api/app}
        REACT_APP_ENTERPRISE_PRODUCT_NAME: ${REACT_APP_ENTERPRISE_PRODUCT_NAME:-Life Helpers Signature Portal}
        REACT_APP_ENTERPRISE_COMPANY_NAME: ${REACT_APP_ENTERPRISE_COMPANY_NAME:-Life Helpers Initiative}
        REACT_APP_ENTERPRISE_META_DESCRIPTION: ${REACT_APP_ENTERPRISE_META_DESCRIPTION:-Enterprise document management and e-signature platform.}
        VITE_APPID: ${APP_ID:-opensign}
        VITE_MICROSOFT_CLIENT_ID: ${VITE_MICROSOFT_CLIENT_ID:-}
        VITE_MICROSOFT_TENANT_ID: ${VITE_MICROSOFT_TENANT_ID:-}
        VITE_MICROSOFT_REDIRECT_URI: ${VITE_MICROSOFT_REDIRECT_URI:-https://sign.lhinigeria.org}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      APP_ID: ${APP_ID:-opensign}
      PUBLIC_URL: ${PUBLIC_URL:-https://sign.lhinigeria.org}
      SERVER_URL: ${SERVER_URL:-https://sign.lhinigeria.org/api/app}
      REACT_APP_SERVERURL: ${REACT_APP_SERVERURL:-https://sign.lhinigeria.org/api/app}
      REACT_APP_USE_LOCAL: ${USE_LOCAL:-true}
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  server:
    build:
      context: .
      dockerfile: apps/OpenSignServer/Dockerfile
    restart: unless-stopped
    expose:
      - "8085"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - opensign-files:/usr/src/app/files
    environment:
      NODE_ENV: production
      PORT: 8085
      APP_ID: ${APP_ID:-opensign}
      MASTER_KEY: ${MASTER_KEY:?Set MASTER_KEY in Coolify}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/opensign}
      DATABASE_URI: ${DATABASE_URI:-mongodb://mongo:27017/opensign}
      PARSE_MOUNT: ${PARSE_MOUNT:-/app}
      SERVER_URL: ${SERVER_URL:-https://sign.lhinigeria.org/api/app}
      PUBLIC_URL: ${PUBLIC_URL:-https://sign.lhinigeria.org}
      USE_LOCAL: ${USE_LOCAL:-true}
      GRAPH_SERVICE_ACCOUNT: ${GRAPH_SERVICE_ACCOUNT:-helpdesk@lhinigeria.org}
      GRAPH_DEFAULT_SENDER: ${GRAPH_DEFAULT_SENDER:-helpdesk@lhinigeria.org}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI:-https://sign.lhinigeria.org}
      PFX_BASE64: ${PFX_BASE64:-}
      PASS_PHRASE: ${PASS_PHRASE:-}
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:8085/health >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  mongo:
    image: mongo:8
    restart: unless-stopped
    expose:
      - "27017"
    volumes:
      - data-volume:/data/db
    healthcheck:
      test:
        - CMD
        - mongosh
        - --quiet
        - --eval
        - db.adminCommand('ping').ok
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

volumes:
  data-volume:
  opensign-files:
